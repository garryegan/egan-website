<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="/index.html">Home</a></li>
            <li><a href="/events.html">Events</a></li>
            <li><a href="/markets.html">Markets</a></li>
            <li><a href="/restaurants.html">Restaurants</a></li>
            <li><a href="/cooking.html">Cooking</a></li>
            <li><a href="/map.html">Map</a></li>
        </ul>
    </nav>

    <div class="main-content container">
        <h1>Travel Map</h1>

        <div class="map-wrapper">
            <div id="map"></div>

            <!-- Correct caption ID -->
            <div id="mapCaption">Explore trips and locations using the legend.</div>

            <!-- Correct legend toggle ID -->
            <button id="legendToggle">Legend</button>

            <!-- Correct legend container ID -->
            <div id="legend" style="display:none;"></div>
        </div>
    </div>

    <!-- Load D1 data BEFORE map.js -->
    <script>
        fetch("/api/map")
            .then(r => r.json())
            .then(data => {
                window.allData = data;
                // initMap() will run after Google Maps loads
                if (window.google && window.google.maps) {
                    initMap();
                }
            })
            .catch(err => console.error("❌ Failed to load D1 map data:", err));
    </script>

    <!-- Map logic -->
    <script src="/js/map.js"></script>

    <!-- Google Maps loader (dynamic key fetch) -->
    <script src="/js/load-maps.js"></script>

</body>
</html>
